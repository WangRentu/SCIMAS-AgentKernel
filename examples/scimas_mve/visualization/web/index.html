<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SCIMAS Live ResearchOps</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="left">
        <div class="title">SCIMAS Live ResearchOps</div>
        <span class="badge"><span id="health-dot" class="dot"></span><span id="health-text">health:-</span></span>
        <span class="badge" id="alerts-badge">alerts:0</span>
        <span class="badge" id="release-badge">top release:-</span>
      </div>
      <div class="right">
        <input id="run-search" class="input-mini" placeholder="Run/Episode Search" />
        <select id="episode-select"></select>
        <select id="mode-select"><option value="live">Live</option><option value="replay">Replay</option></select>
        <input id="replay-slider" type="range" min="0" max="100" value="100" class="hidden" />
        <button id="snapshot-btn">Snapshot</button>
        <button id="export-btn">Export</button>
      </div>
    </header>

    <div class="body" id="body-layout">
      <aside class="sidebar">
        <section class="panel">
          <div class="panel-head">Filters</div>
          <div class="panel-body">
            <input id="search-input" placeholder="task/agent/error..." />
            <div class="chips" id="type-filters"></div>
            <div class="chips" id="error-filters"></div>
          </div>
        </section>
        <section class="panel">
          <div class="panel-head">Agents <span id="agent-count"></span></div>
          <div class="panel-body list" id="agent-list"></div>
        </section>
        <section class="panel">
          <div class="panel-head">Alert Center</div>
          <div class="panel-body list" id="alert-list"></div>
        </section>
      </aside>

      <main class="main">
        <section class="panel fill">
          <div class="panel-head">Process Timeline</div>
          <div class="panel-body fill"><div class="timeline" id="timeline"></div></div>
        </section>
        <section class="panel fill">
          <div class="panel-head">Taskboard <span id="task-summary"></span></div>
          <div class="panel-body fill">
            <div class="stats" id="task-pills"></div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Task</th><th>Type</th><th>State</th><th>Owner</th><th>Lease/HB</th><th>Deps</th><th>C→S</th><th>S→C</th><th>Release</th><th>Run</th>
                  </tr>
                </thead>
                <tbody id="task-tbody"></tbody>
              </table>
            </div>
          </div>
        </section>
      </main>

      <aside class="inspector">
        <section class="panel">
          <div class="panel-head">
            Inspector
            <button id="inspector-toggle">Hide</button>
          </div>
          <div class="panel-body" id="inspector-summary">No selection</div>
        </section>
        <section class="tabs" id="inspector-tabs"></section>
        <section class="panel fill"><div class="panel-body fill" id="inspector-content">Select timeline/task row.</div></section>
      </aside>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
